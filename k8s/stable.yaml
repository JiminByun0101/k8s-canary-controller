apiVersion: apps/v1
kind: Deployment
metadata: 
  name: sample-app-stable
  labels: 
    app: sample-app
    track: stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sample-app
      track: stable
  template:
    metadata: 
      labels:
        app: sample-app
        track: stable
    spec:
      containers:
      - name: sample-app
        image: sample-app:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: APP_VERSION
          value: "v1"
---
apiVersion: v1
kind: Service
metadata: 
  name: sample-app
spec:
  selector:
    app: sample-app
  ports:
  - port: 80
    targetPort: 8080
    